services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: opentab
      POSTGRES_PASSWORD: opentab
      POSTGRES_DB: opentab
    ports:
      - "5432:5432"
    volumes:
      - opentab_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opentab -d opentab"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:8-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - opentab_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  opentab_postgres:
  opentab_redis:
