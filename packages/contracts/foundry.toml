[profile.default]
src = "src"
test = "test"
script = "script"
out = "out"
libs = ["lib"]
solc_version = "0.8.36"
optimizer = true
optimizer_runs = 200
via_ir = true
evm_version = "cancun"
bytecode_hash = "ipfs"
cbor_metadata = true
extra_output = ["storageLayout"]
# Pinned OpenZeppelin/forge-std emit deprecated-assembly-comment (2424) and
# future-keyword (6335) diagnostics under solc 0.8.36. Solc then emits the
# aggregate overflow diagnostic (4591) after counting those suppressed vendor
# warnings. Product-source lint remains an explicit, unsuppressed gate.
ignored_error_codes = [2424, 4591, 6335]
ffi = false
fs_permissions = [
  { access = "read-write", path = "./deployments" },
  { access = "read-write", path = "./evidence" }
]

[fuzz]
runs = 1000
max_test_rejects = 65536
seed = "0x4f70656e546162"

[invariant]
runs = 256
depth = 64
fail_on_revert = false

[profile.ci]
fuzz.runs = 5000
invariant.runs = 512
invariant.depth = 96

[lint]
# Production lint is an explicit gate (`forge lint src --force`). Foundry 1.7's
# lint-on-build also traverses test/dependency casts and collapses them into the
# unhelpful "more than 256 warnings" compiler summary.
lint_on_build = false
