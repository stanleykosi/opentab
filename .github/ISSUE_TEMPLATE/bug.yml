name: Bug report
description: Reproducible OpenTab defect without secrets or personal data
title: "[Bug] "
labels: [bug]
body:
  - type: textarea
    attributes: { label: Expected behavior }
    validations: { required: true }
  - type: textarea
    attributes: { label: Actual behavior and safe reproduction }
    validations: { required: true }
  - type: dropdown
    attributes:
      label: Payment submission may have occurred?
      options: [No, Yes, Unknown, Not applicable]
    validations: { required: true }
  - type: input
    attributes: { label: Safe request/order reference (never tokens/signatures) }
  - type: textarea
    attributes: { label: Environment, commit, browser, logs with secrets redacted }
