# Temporarily disabled. Move back to .github/workflows/ to reactivate.
name: Security

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "17 5 * * 1"

permissions:
  contents: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repository-security:
    name: Secrets, dependency audit, and licenses
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install pnpm 9.15.1
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 9.15.1
      - name: Install Node 25.0.0
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 25.0.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Scan repository content
        run: pnpm security:secrets
      - name: Create dependency audit evidence and reject unapproved findings
        run: >-
          node scripts/verify-dependency-audit.mjs
          --output artifacts/autonomous-build/test-results/dependency-audit.json
      - name: Verify production licenses and create reviewed inventory
        run: pnpm security:licenses
      - name: Reject stale or untracked license evidence
        run: |
          git ls-files --error-unmatch THIRD_PARTY_NOTICES.md artifacts/autonomous-build/evidence/dependency-licenses.json
          git diff --exit-code -- THIRD_PARTY_NOTICES.md artifacts/autonomous-build/evidence/dependency-licenses.json
      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dependency-security-${{ github.sha }}
          path: |
            artifacts/autonomous-build/test-results/dependency-audit.json
            artifacts/autonomous-build/evidence/dependency-licenses.json
          if-no-files-found: warn
          retention-days: 30

  codeql:
    name: CodeQL JavaScript/TypeScript
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Initialize CodeQL
        uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
        with:
          languages: javascript-typescript
      - name: Analyze
        uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4

  dependency-review:
    name: Pull request dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Reject vulnerable dependency changes
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high
          allow-ghsas: GHSA-3gc7-fjrx-p6mg # QW-002; independently patch-verified above.

  slither:
    name: Slither static analysis
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Check out source and pinned submodules
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive
          persist-credentials: false
      - name: Install pinned Foundry
        uses: foundry-rs/foundry-toolchain@b00af27efadbc7b4ca8b82abbd903b17cc874d2a # v1
        with:
          version: v1.7.1
      - name: Install pinned Slither
        run: python3 -m pip install --disable-pip-version-check slither-analyzer==0.11.5
      - name: Build contracts
        working-directory: packages/contracts
        run: forge build --sizes
      - name: Run Slither and emit SARIF
        working-directory: packages/contracts
        run: slither . --config-file slither.config.json --sarif slither.sarif --fail-high
      - name: Upload Slither SARIF
        if: always() && hashFiles('packages/contracts/slither.sarif') != ''
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
        with:
          sarif_file: packages/contracts/slither.sarif
