# Temporarily disabled. Move back to .github/workflows/ to reactivate.
name: Release Readiness

on:
  workflow_dispatch:
    inputs:
      release_ref:
        description: Full lowercase 40-character commit SHA to validate
        required: true

permissions:
  contents: read

concurrency:
  group: release-readiness-${{ inputs.release_ref }}
  cancel-in-progress: false

env:
  CI: "true"
  NEXT_TELEMETRY_DISABLED: "1"

jobs:
  application:
    name: Complete application release gate
    runs-on: ubuntu-latest
    timeout-minutes: 55
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: opentab
          POSTGRES_PASSWORD: opentab_release
          POSTGRES_DB: opentab_release
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U opentab -d opentab_release"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      APP_ENV: test
      NEXT_PUBLIC_APP_ENV: test
      PROVIDER_MODE: deterministic
      DETERMINISTIC_DEMO_ENABLED: "true"
      PAYMENTS_ENABLED: "false"
      PARTICLE_LIVE_ENABLED: "false"
      BOOTSTRAP_SPONSOR_ENABLED: "false"
      INDEXER_ENABLED: "false"
      INDEXER_WRITES_ENABLED: "false"
      DATABASE_URL: postgresql://opentab:opentab_release@127.0.0.1:5432/opentab_release
      DATABASE_URL_TEST: postgresql://opentab:opentab_release@127.0.0.1:5432/opentab_release
      DATABASE_URL_MIGRATIONS: postgresql://opentab:opentab_release@127.0.0.1:5432/opentab_release
      REDIS_URL: redis://127.0.0.1:6379
      REDIS_URL_TEST: redis://127.0.0.1:6379
    steps:
      - name: Check out requested release
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.release_ref }}
          persist-credentials: false
      - name: Verify immutable release provenance
        env:
          RELEASE_REF: ${{ inputs.release_ref }}
        run: |
          [[ "$RELEASE_REF" =~ ^[0-9a-f]{40}$ ]]
          test "$(git rev-parse HEAD)" = "$RELEASE_REF"
      - name: Install pnpm 9.15.1
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 9.15.1
      - name: Install Node 25.0.0
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 25.0.0
          cache: pnpm
      - name: Verify exact toolchain
        run: |
          test "$(node --version)" = "v25.0.0"
          test "$(pnpm --version)" = "9.15.1"
      - run: pnpm install --frozen-lockfile
      - run: node scripts/verify-release-config.mjs
      - run: pnpm docs:check
      - run: pnpm env:check
      - run: pnpm quality:placeholders
      - run: pnpm quality:boundaries
      - run: pnpm security:secrets
      - run: pnpm ops:check
      - run: pnpm security:audit
      - run: pnpm security:licenses
      - name: Reject stale or untracked license evidence
        run: |
          git ls-files --error-unmatch THIRD_PARTY_NOTICES.md artifacts/autonomous-build/evidence/dependency-licenses.json
          git diff --exit-code -- THIRD_PARTY_NOTICES.md artifacts/autonomous-build/evidence/dependency-licenses.json
      - run: pnpm vendor:inspect
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm --filter '!@opentab/contracts' typecheck
      - run: pnpm --filter '!@opentab/contracts' test:unit
      - name: Validate and apply migrations to ephemeral PostgreSQL
        run: |
          pnpm --filter @opentab/db db:check
          pnpm --filter @opentab/db db:migrate
      - run: pnpm --filter '!@opentab/contracts' test:integration
      - run: pnpm --filter '!@opentab/contracts' build
      - name: Execute the assembled indexer runtime
        run: pnpm --filter @opentab/indexer test:packaged
      - name: Smoke the built web application without mutations
        run: |
          log_file="$RUNNER_TEMP/opentab-web-smoke.log"
          evidence_file="artifacts/autonomous-build/test-results/release-web-smoke.txt"
          mkdir -p "$(dirname "$evidence_file")"
          pnpm --dir apps/web exec next start --hostname 127.0.0.1 --port 3000 >"$log_file" 2>&1 &
          server_pid=$!
          trap 'kill "$server_pid" 2>/dev/null || true; wait "$server_pid" 2>/dev/null || true' EXIT
          for _ in $(seq 1 60); do
            if curl --fail --silent --max-time 2 http://127.0.0.1:3000/api/health >/dev/null; then
              break
            fi
            if ! kill -0 "$server_pid" 2>/dev/null; then
              cat "$log_file"
              exit 1
            fi
            sleep 1
          done
          curl --fail --silent --max-time 2 http://127.0.0.1:3000/api/health >/dev/null || {
            cat "$log_file"
            exit 1
          }
          if ! OPENTAB_BASE_URL=http://127.0.0.1:3000 pnpm smoke:demo >"$evidence_file" 2>&1; then
            cat "$evidence_file"
            exit 1
          fi
          cat "$evidence_file"
      - name: Verify completed release reports and evidence ledger
        run: pnpm release:artifacts
      - name: Install Chromium, Firefox, and WebKit dependencies
        run: pnpm --filter @opentab/web exec playwright install --with-deps chromium firefox webkit
      - name: Run desktop and mobile browser journeys
        run: pnpm --filter @opentab/web test:e2e
      - name: Run Firefox critical portability checks
        env:
          PLAYWRIGHT_FIREFOX_ENABLED: "true"
          PLAYWRIGHT_RESULTS_FILE: ../../artifacts/autonomous-build/test-results/frontend-playwright-firefox.json
        run: pnpm --filter @opentab/web exec playwright test --project=firefox-critical
      - name: Run WebKit mobile critical portability checks
        env:
          PLAYWRIGHT_WEBKIT_ENABLED: "true"
          PLAYWRIGHT_RESULTS_FILE: ../../artifacts/autonomous-build/test-results/frontend-playwright-webkit.json
        run: pnpm --filter @opentab/web exec playwright test --project=webkit-mobile-critical
      - name: Generate immutable release manifest
        run: node scripts/generate-manifest.mjs
      - name: Upload application release evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: application-release-${{ github.run_id }}
          path: |
            MANIFEST.json
            evidence/vendor/sdk-surface.json
            artifacts/autonomous-build/test-results/release-web-smoke.txt
            artifacts/autonomous-build/test-results/frontend-playwright-firefox.json
            artifacts/autonomous-build/test-results/frontend-playwright-webkit.json
            apps/web/playwright-report
            apps/web/test-results
          if-no-files-found: warn
          retention-days: 30

  contracts:
    name: Complete contract release gate
    runs-on: ubuntu-latest
    timeout-minutes: 55
    defaults:
      run:
        working-directory: packages/contracts
    env:
      FOUNDRY_PROFILE: ci
    steps:
      - name: Check out requested release and submodules
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.release_ref }}
          submodules: recursive
          persist-credentials: false
      - name: Verify immutable release provenance
        env:
          RELEASE_REF: ${{ inputs.release_ref }}
        run: |
          [[ "$RELEASE_REF" =~ ^[0-9a-f]{40}$ ]]
          test "$(git rev-parse HEAD)" = "$RELEASE_REF"
      - name: Install pinned Foundry
        uses: foundry-rs/foundry-toolchain@b00af27efadbc7b4ca8b82abbd903b17cc874d2a # v1
        with:
          version: v1.7.1
      - run: forge --version
      - run: forge fmt --check
      - run: forge lint src --force
      - run: forge build --sizes
      - run: forge test --no-match-path 'test/fork/*' -vvv
      - run: forge coverage --ir-minimum --report summary --no-match-path 'test/fork/*'
      - run: forge snapshot --check
      - name: Install pinned Slither
        run: python3 -m pip install --disable-pip-version-check slither-analyzer==0.11.5
      - name: Run Slither
        run: slither . --config-file slither.config.json --fail-high
      - name: Upload contract release evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: contract-release-${{ github.run_id }}
          path: |
            packages/contracts/.gas-snapshot
            packages/contracts/out
          if-no-files-found: warn
          retention-days: 30
