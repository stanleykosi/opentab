version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule: { interval: weekly }
    open-pull-requests-limit: 5
    groups:
      test-tooling:
        patterns: ["vitest", "@playwright/*", "@testing-library/*", "msw"]
    labels: [dependencies]
  - package-ecosystem: github-actions
    directory: /
    schedule: { interval: monthly }
    labels: [dependencies, ci]
